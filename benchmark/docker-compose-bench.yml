# Side-by-side benchmark stack.
#
# Spins up one Postgres, one Flask container, one FastAPI container — all
# bound to the same host with equal CPU budgets — so k6 can drive both APIs
# against an identical data layer and we compare framework/runtime cost
# (not infra).
#
# Build context for each API points at the sibling repo on disk:
#   ../../FlaskProject  →  Flask container
#   ..                  →  FastAPI container (this repo)
#
# Run:  docker compose -f benchmark/docker-compose-bench.yml up --build -d
# Tear: docker compose -f benchmark/docker-compose-bench.yml down -v

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bench_user
      POSTGRES_PASSWORD: bench_pass
      POSTGRES_DB: bench_db
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench_user -d bench_db"]
      interval: 3s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "1G"

  flask:
    build:
      context: ../../FlaskProject
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_DB_HOST: db
      APP_DB_PORT: 5432
      APP_DB_NAME: bench_db
      APP_DB_USER: bench_user
      APP_DB_PASSWORD: bench_pass
    ports:
      - "5001:5001"
    # Production-shaped: gunicorn with 4 workers x 4 threads for parity with
    # the FastAPI uvicorn --workers 4 setup.
    command: >
      sh -c "pip install gunicorn==23.0.0 &&
             alembic upgrade head &&
             gunicorn -w 4 --threads 4 -b 0.0.0.0:5001 app:app
                      --access-logfile - --log-level warning"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "1G"

  fastapi:
    build:
      context: ..
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_DB_HOST: db
      APP_DB_PORT: 5432
      APP_DB_NAME: bench_db
      APP_DB_USER: bench_user
      APP_DB_PASSWORD: bench_pass
      APP_LOG_LEVEL: WARNING
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
                                  --log-level warning"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "1G"
